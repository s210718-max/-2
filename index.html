<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生日卡片產生器 - 製作專區</title>
    <style>
        :root {
            --primary: #ff7f50;
            --bg-body: #f0f2f5;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-body);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            max-width: 1000px;
            width: 100%;
            overflow: hidden;
        }

        /* 左側：控制面板 */
        .editor {
            flex: 1;
            padding: 40px;
            min-width: 300px;
            border-right: 1px solid #eee;
        }

        h2 { color: #333; margin-top: 0; }
        label { display: block; margin: 15px 0 5px; font-weight: bold; color: #555; }
        
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }

        .theme-group { display: flex; gap: 10px; margin-top: 10px; }
        .btn-theme {
            flex: 1; padding: 10px; border: 1px solid #ddd; background: white;
            cursor: pointer; border-radius: 8px; transition: 0.3s;
        }
        .btn-theme.active { background: var(--primary); color: white; border-color: var(--primary); }

        .gen-btn {
            width: 100%; margin-top: 30px; padding: 15px;
            background: #2ecc71; color: white; border: none;
            border-radius: 8px; font-size: 18px; font-weight: bold;
            cursor: pointer; transition: 0.3s;
        }
        .gen-btn:hover { background: #27ae60; transform: translateY(-2px); }

        /* 右側：即時預覽 */
        .preview-section {
            flex: 1;
            padding: 40px;
            background: #fafafa;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 350px;
        }

        /* --- 卡片主體樣式 --- */
        #card-preview {
            width: 320px;
            height: 450px;
            border-radius: 15px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 30px;
            box-sizing: border-box;
            transition: 0.5s;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        /* 裝飾元件 */
        .deco-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .deco-icon { font-size: 50px; margin-bottom: 20px; z-index: 1; animation: float 3s infinite ease-in-out; }
        .preview-text { z-index: 1; color: inherit; }

        /* 主題樣式庫 */
        .theme-sweet { background: #ffb6c1; color: #8b0000; }
        .theme-sweet .deco-bg { background-image: radial-gradient(#fff 2px, transparent 2px); background-size: 20px 20px; opacity: 0.3; }
        
        .theme-elegant { background: #2c3e50; color: #f1c40f; border: 5px double #f1c40f; }
        .theme-elegant .deco-bg { background: linear-gradient(45deg, transparent 45%, #f1c40f 50%, transparent 55%); background-size: 10px 10px; opacity: 0.1; }

        .theme-sky { background: #87ceeb; color: white; }
        .theme-sky .deco-bg { background: white; border-radius: 50%; width: 100px; height: 100px; top: -20px; right: -20px; filter: blur(30px); opacity: 0.5; }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        #result-link {
            margin-top: 20px; padding: 15px; background: #e8f4fd;
            border-radius: 8px; font-size: 13px; word-break: break-all;
            display: none; border: 1px dashed #3498db;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="editor">
        <h2>🎨 卡片定製器</h2>
        
        <label>你的祝福語</label>
        <input type="text" id="inputMsg" placeholder="例如：生日快樂，天天開心！" oninput="update()">
        
        <label>背景音樂連結 (.mp3)</label>
        <input type="text" id="inputMusic" placeholder="貼上 MP3 直連網址" oninput="update()">

        <label>選擇裝飾風格</label>
        <div class="theme-group">
            <button class="btn-theme active" onclick="setTheme('theme-sweet', '🎂', this)">甜美粉</button>
            <button class="btn-theme" onclick="setTheme('theme-elegant', '✨', this)">質感金</button>
            <button class="btn-theme" onclick="setTheme('theme-sky', '☁️', this)">清爽藍</button>
        </div>

        <button class="gen-btn" onclick="generateURL()">生成分享連結</button>
        
        <div id="result-link"></div>
    </div>

    <div class="preview-section">
        <p style="color: #999;">即時預覽</p>
        <div id="card-preview" class="theme-sweet">
            <div class="deco-bg"></div>
            <div class="deco-icon" id="previewIcon">🎂</div>
            <h1 class="preview-text" id="previewText">生日快樂！</h1>
        </div>
    </div>
</div>

<script>
    let currentTheme = 'theme-sweet';
    let currentIcon = '🎂';

    function update() {
        const msg = document.getElementById('inputMsg').value;
        document.getElementById('previewText').innerText = msg || "生日快樂！";
    }

    function setTheme(theme, icon, btn) {
        currentTheme = theme;
        currentIcon = icon;
        document.getElementById('card-preview').className = theme;
        document.getElementById('previewIcon').innerText = icon;
        
        document.querySelectorAll('.btn-theme').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function generateURL() {
        const msg = encodeURIComponent(document.getElementById('inputMsg').value || "生日快樂！");
        const music = encodeURIComponent(document.getElementById('inputMusic').value);
        const theme = currentTheme;
        const icon = encodeURIComponent(currentIcon);

        // 自動取得當前路徑並指向 card.html
        const basePath = window.location.href.substring(0, window.location.href.lastIndexOf('/') + 1);
        const finalURL = `${basePath}card.html?msg=${msg}&m=${music}&t=${theme}&i=${icon}`;

        const resultDiv = document.getElementById('result-link');
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = `<strong>製作完成！傳給壽星：</strong><br><a href="${finalURL}" target="_blank">${finalURL}</a>`;
    }
</script>

</body>
</html>
