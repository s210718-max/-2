<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生日卡片產生器 - 製作專區</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="editor">
        <h2>🎂 卡片產生器</h2>
        <label>祝福語</label>
        <input type="text" id="inputMsg" placeholder="輸入你想說的話" oninput="update()">
        
        <label>音樂連結 (.mp3)</label>
        <input type="text" id="inputMusic" placeholder="貼上 MP3 直連網址">
        
        <label>選擇主題</label>
        <div class="theme-group">
            <button class="btn-theme active" onclick="setTheme('theme-sweet', '🎁', this)">甜美</button>
            <button class="btn-theme" onclick="setTheme('theme-elegant', '✨', this)">質感</button>
            <button class="btn-theme" onclick="setTheme('theme-sky', '🎈', this)">清爽</button>
        </div>

        <button class="gen-btn" onclick="generateURL()">生成卡片連結</button>
        <div id="result-link"></div>
    </div>

    <div class="preview-section">
        <p>即時預覽</p>
        <div id="card-preview" class="theme-sweet">
            <div class="deco-bg"></div>
            <div class="deco-icon" id="previewIcon">🎁</div>
            <h1 class="preview-text" id="previewText">生日快樂！</h1>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>

</body>
</html>
