<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>你有一份生日驚喜！</title>
    <style>
        body {
            margin: 0; height: 100vh; display: flex; 
            justify-content: center; align-items: center;
            background-color: #f0f2f5; font-family: sans-serif;
        }

        .card {
            width: 350px; height: 500px; border-radius: 20px;
            position: relative; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center; padding: 40px; box-sizing: border-box;
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
            overflow: hidden; animation: zoomIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes zoomIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }

        /* 裝飾層 */
        .deco-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        .deco-icon { font-size: 70px; margin-bottom: 30px; z-index: 1; animation: float 3s infinite ease-in-out; }
        .message { z-index: 1; font-size: 24px; line-height: 1.5; font-weight: bold; }

        /* 主題樣式 (需與 index.html 保持一致) */
        .theme-sweet { background: #ffb6c1; color: #8b0000; }
        .theme-sweet .deco-bg { background-image: radial-gradient(#fff 2px, transparent 2px); background-size: 20px 20px; opacity: 0.3; }
        
        .theme-elegant { background: #2c3e50; color: #f1c40f; border: 8px double #f1c40f; }
        .theme-elegant .deco-bg { background: linear-gradient(45deg, transparent 45%, #f1c40f 50%, transparent 55%); background-size: 10px 10px; opacity: 0.1; }

        .theme-sky { background: #87ceeb; color: white; }
        .theme-sky .deco-bg { background: white; border-radius: 50%; width: 150px; height: 150px; top: -30px; right: -30px; filter: blur(40px); opacity: 0.6; }

        @keyframes float { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-20px) rotate(5deg); } }

        .hint { position: fixed; bottom: 30px; color: #888; font-size: 14px; }
    </style>
</head>
<body>

<div id="cardBody" class="card">
    <div class="deco-bg"></div>
    <div class="deco-icon" id="cardIcon">🎂</div>
    <div class="message" id="cardMsg">載入中...</div>
</div>

<div class="hint">🎵 點擊畫面播放專屬音樂</div>

<script>
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const msg = urlParams.get('msg') || "生日快樂！";
        const music = urlParams.get('m');
        const theme = urlParams.get('t') || "theme-sweet";
        const icon = urlParams.get('i') || "🎂";

        // 套用內容
        document.getElementById('cardMsg').innerText = msg;
        document.getElementById('cardIcon').innerText = icon;
        document.getElementById('cardBody').className = "card " + theme;

        // 音樂處理
        if (music) {
            const audio = new Audio(music);
            audio.loop = true;
            document.body.onclick = () => {
                audio.play();
                document.querySelector('.hint').innerText = "🎉 音樂播放中...";
            };
        }
    }
</script>

</body>
</html>
