<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>收信囉！一份生日驚喜</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="card" class="card-final">
    <div class="deco-bg"></div>
    <div class="deco-icon" id="icon">🎂</div>
    <div class="msg" id="msg">載入中...</div>
</div>
<div class="hint" id="playBtn">🎵 點擊卡片開啟音樂驚喜</div>

<script>
    // 展示頁專用的簡單邏輯
    window.onload = function() {
        const p = new URLSearchParams(window.location.search);
        document.getElementById('msg').innerText = p.get('msg') || "生日快樂！";
        document.getElementById('icon').innerText = p.get('i') || "🎂";
        document.getElementById('card').className = "card-final " + (p.get('t') || "theme-sweet");

        const m = p.get('m');
        if (m) {
            const audio = new Audio(m); 
            audio.loop = true;
            document.body.onclick = () => { 
                audio.play(); 
                document.getElementById('playBtn').innerText = "🎉 慶祝中..."; 
            };
        }
    };
</script>
</body>
</html>
</body>
</html>
